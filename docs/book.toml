[book]
title = "Provena"
description = "Open source provenance microkernel"
authors = ["Provena Contributors"]
language = "en"
src = "src"

[preprocessor.mermaid]
command = "mdbook-mermaid"

[preprocessor.strip-frontmatter]
command = "/home/matthew/.cargo/bin/mdbook-strip-frontmatter"

[output.html]
git-repository-url = "https://github.com/provenancai/provena"
edit-url-template = "https://github.com/provenancai/provena/edit/main/docs/src/{path}"
additional-js = ["mermaid.min.js", "mermaid-init.js"]
